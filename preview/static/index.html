<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>qkagent HTML preview</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1 id="uiTitle"></h1>
        <p id="actionsRoot"></p>
      </div>
      <ul id="actionList" class="action-list"></ul>
    </aside>
    <main class="main">
      <div class="toolbar">
        <div class="toolbar-start">
          <label>
            <span id="uiWidthLabel"></span>
            <input id="widthSlider" type="range" min="320" max="1200" value="720" step="10">
            <span id="widthValue">720px</span>
          </label>
          <label>
            <input id="siteChrome" type="checkbox" checked>
            <span id="uiSiteChromeLabel"></span>
          </label>
          <label>
            <input id="fileInput" type="file" accept=".html,.htm,text/html" hidden>
            <button type="button" id="btnOpenFile"></button>
          </label>
        </div>
        <div class="toolbar-end">
          <span id="status" class="status"></span>
          <div class="toolbar-actions">
            <button id="btnReload" type="button"></button>
            <button id="btnSave" type="button" class="primary" disabled></button>
          </div>
        </div>
      </div>
      <div class="panels-tabs" role="tablist">
        <span class="panels-tab" id="uiSourceHeader" role="tab"></span>
        <span class="panels-tab panels-tab--preview" id="uiPreviewHeader" role="tab"></span>
      </div>
      <div class="panels">
        <section class="panel">
          <textarea id="htmlEditor" spellcheck="false"></textarea>
        </section>
        <section class="panel">
          <div class="preview-wrap">
            <div id="previewOuter" class="preview-frame-outer site-chrome">
              <iframe id="previewFrame" title="preview" sandbox="allow-same-origin"></iframe>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
